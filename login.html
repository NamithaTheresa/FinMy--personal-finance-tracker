<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Personal Finance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f0f9f0 0%, #e8f5e8 50%, #d4f4d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(144, 238, 144, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(152, 251, 152, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 48px 40px;
            border-radius: 32px;
            box-shadow: 
                0 20px 60px rgba(34, 139, 34, 0.15),
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(144, 238, 144, 0.3);
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #90EE90 0%, #98FB98 50%, #90EE90 100%);
            box-shadow: 0 2px 8px rgba(144, 238, 144, 0.4);
        }

        .login-container::after {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(144, 238, 144, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #228B22 0%, #32CD32 50%, #228B22 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(34, 139, 34, 0.1);
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid rgba(144, 238, 144, 0.3);
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(248, 255, 248, 0.8);
            backdrop-filter: blur(5px);
        }

        .form-group input:focus {
            outline: none;
            border-color: #90EE90;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 
                0 0 0 4px rgba(144, 238, 144, 0.2),
                0 4px 12px rgba(34, 139, 34, 0.1);
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #228B22 0%, #32CD32 50%, #228B22 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 6px 20px rgba(34, 139, 34, 0.3),
                0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px rgba(34, 139, 34, 0.4),
                0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
            color: #9ca3af;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(144, 238, 144, 0.4), transparent);
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 16px;
            position: relative;
            z-index: 2;
        }

        .signup-link {
            text-align: center;
            margin-top: 24px;
        }

        .signup-link p {
            color: #6b7280;
            font-size: 14px;
        }

        .signup-link a {
            color: #228B22;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            position: relative;
        }

        .signup-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #228B22, #32CD32);
            transition: width 0.3s ease;
        }

        .signup-link a:hover {
            color: #32CD32;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .forgot-password {
            color: #228B22;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 0;
            height: 1px;
            background: #32CD32;
            transition: width 0.3s ease;
        }

        .forgot-password:hover {
            color: #32CD32;
        }

        .forgot-password:hover::after {
            width: 100%;
        }

        .error-message {
            background: linear-gradient(135deg, #ffe6e6 0%, #fff0f0 100%);
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
            border: 2px solid rgba(220, 38, 38, 0.2);
            display: none;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.1);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                margin: 20px;
            }
            
            .logo h1 {
                font-size: 28px;
            }
        }

        /* Decorative elements */
        .decorative-leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, #90EE90, #98FB98);
            border-radius: 0 100% 0 100%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .decorative-leaf:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .decorative-leaf:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 2s;
        }

        .decorative-leaf:nth-child(3) {
            bottom: 15%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* Subtle animations */
        .login-container {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="decorative-leaf"></div>
        <div class="decorative-leaf"></div>
        <div class="decorative-leaf"></div>
        
        <div class="logo">
            <h1>FinMy</h1>
            <p>Manage your money, beautifully</p>
        </div>

        <div class="error-message" id="errorMessage">
            Please enter both username and password.
        </div>

        <form onsubmit="return loginUser()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password">
            </div>

            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="/forgot-password" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <div class="signup-link">
            <p>Don't have an account? <a href="registration.html">Create one here</a></p>
        </div>
    </div>

    <script>
        function loginUser() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorMessage = document.getElementById("errorMessage");

            const storedUsername = localStorage.getItem("finmy_username");
            const storedPassword = localStorage.getItem("finmy_password");

            if (username === "" || password === "") {
                errorMessage.textContent = "Please enter both username and password.";
                errorMessage.style.display = "block";
                setTimeout(() => { errorMessage.style.display = "none"; }, 3000);
                return false;
            }

            if (username === storedUsername && password === storedPassword) {
                errorMessage.style.display = "none";
                // Store the logged-in username for display
                localStorage.setItem("finmy_loggedin_user", username);
                window.location.href = "home.html";
                return false; // Prevent default form submit
            } else {
                errorMessage.textContent = "Invalid username or password.";
                errorMessage.style.display = "block";
                setTimeout(() => { errorMessage.style.display = "none"; }, 3000);
                return false;
            }
        }

        function validateForm() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMessage = document.getElementById("errorMessage");
            
            if (username.trim() === "" || password.trim() === "") {
                errorMessage.style.display = "block";
                errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMessage.style.display = "none";
                }, 3000);
                
                return false;
            }
            
            errorMessage.style.display = "none";
            return true;
        }

        // Add focus animations
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Registration example function
        function registerUser() {
            const username = document.getElementById("regUsername").value;
            const password = document.getElementById("regPassword").value;
            // You can add more validation here
            localStorage.setItem("finmy_username", username);
            localStorage.setItem("finmy_password", password);
            // Redirect to login or show success
            window.location.href = "login.html";
            return false;
        }
    </script>
</body>
</html>
