<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMy - Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 50%, #a5d6a7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 45px;
            border-radius: 20px;
            box-shadow: 
                0 20px 40px rgba(46, 125, 50, 0.15),
                0 10px 20px rgba(46, 125, 50, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            width: 400px;
            max-width: 90vw;
            position: relative;
            z-index: 1;
            transform: translateY(0);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #2e7d32;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(46, 125, 50, 0.1);
        }

        .logo p {
            color: #66bb6a;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e8f5e8;
            border-radius: 12px;
            background: linear-gradient(145deg, #f8fdf8, #ffffff);
            font-size: 16px;
            color: #2e7d32;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #66bb6a;
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 187, 106, 0.2);
        }

        .form-group input::placeholder {
            color: #81c784;
            opacity: 0.7;
        }

        .form-group label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #66bb6a;
            font-size: 16px;
            font-weight: 500;
            pointer-events: none;
            transition: all 0.3s ease;
            background: linear-gradient(145deg, #f8fdf8, #ffffff);
            padding: 0 8px;
        }

        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label {
            top: 0;
            font-size: 12px;
            color: #2e7d32;
            font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #81c784;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c8e6c9, transparent);
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 15px;
            position: relative;
            z-index: 1;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .login-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #66bb6a, #4caf50);
            transition: width 0.3s ease;
        }

        .login-link a:hover::after {
            width: 100%;
        }

        .security-info {
            background: linear-gradient(135deg, #e8f5e8, #f1f8f1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #66bb6a;
        }

        .security-info p {
            color: #2e7d32;
            font-size: 12px;
            line-height: 1.4;
            margin: 0;
        }

        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 25px;
                margin: 20px;
            }
            
            .logo h1 {
                font-size: 2rem;
            }
        }

        /* Custom scrollbar for webkit browsers */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #e8f5e8;
        }

        ::-webkit-scrollbar-thumb {
            background: #66bb6a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4caf50;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>FinMy</h1>
            <p>Your Financial Companion</p>
        </div>
        
        <form method="POST" action="/register" onsubmit="return validateForm()">
            <div class="form-group">
                <input type="text" name="username" id="username" placeholder=" " required>
                <label for="username">Username</label>
            </div>
            
            <div class="form-group">
                <input type="email" name="email" id="email" placeholder=" " required>
                <label for="email">Email Address</label>
            </div>
            
            <div class="form-group">
                <input type="password" name="password" id="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>
            
            <button type="submit" class="submit-btn">
                <span class="btn-text">Create Account</span>
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>
        
        <div class="divider">
            <span>Already have an account?</span>
        </div>
        
        <div class="login-link">
            <a href="login.html">Sign in here</a>
        </div>
        
        <div class="security-info">
            <p>🔒 Your information is secure and encrypted. We never share your personal data with third parties.</p>
        </div>
    </div>

    <script>
        function validateForm() {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const submitBtn = document.querySelector('.submit-btn');
            const btnText = document.querySelector('.btn-text');
            const loading = document.querySelector('.loading');

            // Show loading state
            btnText.style.opacity = '0';
            loading.style.display = 'block';
            submitBtn.disabled = true;

            setTimeout(() => {
                btnText.style.opacity = '1';
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }, 1500);

            if (!username || !email || !password) {
                showNotification("All fields are required.", "error");
                return false;
            }
            if (username.length < 3) {
                showNotification("Username must be at least 3 characters long.", "error");
                return false;
            }
            if (!isValidEmail(email)) {
                showNotification("Please enter a valid email address.", "error");
                return false;
            }
            if (password.length < 6) {
                showNotification("Password must be at least 6 characters long.", "error");
                return false;
            }

            // Store credentials in localStorage for login.html
            localStorage.setItem("finmy_username", username);
            localStorage.setItem("finmy_password", password);

            // Show success message
            showNotification("Account created successfully! Redirecting...", "success");
            
            // Redirect to home page after successful validation
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
            
            return false; // Prevent form submission
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showNotification(message, type) {
            // Remove existing notifications
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }

            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 10px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                max-width: 300px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            `;

            if (type === 'error') {
                notification.style.background = 'linear-gradient(135deg, #f44336, #d32f2f)';
            } else {
                notification.style.background = 'linear-gradient(135deg, #4caf50, #388e3c)';
            }

            document.body.appendChild(notification);

            // Auto remove notification
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-in forwards';
                setTimeout(() => notification.remove(), 300);
            }, 4000);
        }

        // Add CSS animations for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Add floating label animation
        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
</body>
</html>
