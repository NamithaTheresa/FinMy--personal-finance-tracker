<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Transactions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f8f0 0%, #e8f5e8 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2e7d32;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(46, 125, 50, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(129, 199, 132, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%);
            border-radius: 2px;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #81c784;
            font-size: 1.1em;
            font-weight: 400;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fdf8 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.1);
            border: 1px solid rgba(129, 199, 132, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(46, 125, 50, 0.15);
        }

        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: 600;
            color: #2e7d32;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #81c784;
            font-size: 0.9em;
        }

        .table-container {
            background: linear-gradient(135deg, #ffffff 0%, #f8fdf8 100%);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.1);
            border: 1px solid rgba(129, 199, 132, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #66bb6a 0%, #4caf50 100%);
            color: white;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
            letter-spacing: 0.5px;
            position: relative;
        }

        th::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 100%);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e8f5e8;
            transition: all 0.3s ease;
            position: relative;
        }

        tr:hover td {
            background: linear-gradient(135deg, #f1f8e9 0%, #e8f5e8 100%);
            transform: scale(1.01);
        }

        tr:nth-child(even) {
            background: rgba(248, 253, 248, 0.5);
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-income {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            color: #2e7d32;
            border: 1px solid #81c784;
        }

        .type-expense {
            background: linear-gradient(135deg, #ffcdd2 0%, #f8bbd9 100%);
            color: #c62828;
            border: 1px solid #e57373;
        }

        .category-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .category-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 100%);
            border: 1px solid #81c784;
        }

        .amount-cell {
            font-weight: 600;
            font-size: 1.1em;
        }

        .amount-income {
            color: #2e7d32;
        }

        .amount-expense {
            color: #c62828;
        }

        .date-cell {
            color: #666;
            font-size: 0.95em;
        }

        .no-transactions {
            text-align: center;
            padding: 50px 20px;
            color: #81c784;
        }

        .no-transactions-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-transactions-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .no-transactions-subtext {
            font-size: 0.9em;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        .table-container {
            animation: fadeIn 0.8s ease forwards;
        }

        .stat-card {
            animation: fadeIn 0.6s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .stats-container {
                grid-template-columns: 1fr 1fr;
            }
            
            table {
                font-size: 0.9em;
            }
            
            th, td {
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header fade-in">
            <h1>💰 Transaction History</h1>
            <p class="subtitle">Track your income and expenses</p>
        </div>

        <div class="stats-container" id="statsContainer">
            <!-- Stats will be populated by JavaScript -->
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>📊 Type</th>
                        <th>🏷️ Category</th>
                        <th>💵 Amount</th>
                        <th>📅 Date</th>
                    </tr>
                </thead>
                <tbody id="transactionTableBody">
                    <!-- Transactions will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Category icons mapping
        const categoryIcons = {
            // Income categories
            'salary': '💼',
            'freelance': '💻',
            'business': '🏢',
            'investment': '📈',
            'rental': '🏠',
            'bonus': '🎁',
            'gift': '💝',
            'other income': '💰',
            
            // Expense categories
            'food': '🍽️',
            'transport': '🚗',
            'shopping': '🛍️',
            'entertainment': '🎬',
            'healthcare': '🏥',
            'education': '📚',
            'utilities': '💡',
            'rent': '🏠',
            'insurance': '🛡️',
            'fitness': '💪',
            'travel': '✈️',
            'groceries': '🛒',
            'dining': '🍽️',
            'fuel': '⛽',
            'clothing': '👕',
            'electronics': '📱',
            'other expense': '💸'
        };

        function getCategoryIcon(category) {
            const lowerCategory = category.toLowerCase();
            return categoryIcons[lowerCategory] || '📋';
        }

        function loadTransactions() {
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            const tbody = document.getElementById('transactionTableBody');
            tbody.innerHTML = '';

            if (transactions.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="no-transactions">
                            <div class="no-transactions-icon">📝</div>
                            <div class="no-transactions-text">No transactions found</div>
                            <div class="no-transactions-subtext">Start adding your income and expenses to see them here!</div>
                        </td>
                    </tr>
                `;
                return;
            }

            // Sort transactions by date (newest first)
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            transactions.forEach((tx, index) => {
                const row = document.createElement('tr');
                row.style.animationDelay = `${index * 0.1}s`;
                row.className = 'fade-in';
                
                const typeIcon = tx.type === 'income' ? '📈' : '📉';
                const amountClass = tx.type === 'income' ? 'amount-income' : 'amount-expense';
                const typeClass = tx.type === 'income' ? 'type-income' : 'type-expense';
                const categoryIcon = getCategoryIcon(tx.category);
                
                row.innerHTML = `
                    <td>
                        <div class="type-badge ${typeClass}">
                            ${typeIcon} ${tx.type}
                        </div>
                    </td>
                    <td>
                        <div class="category-cell">
                            <div class="category-icon">${categoryIcon}</div>
                            <span>${tx.category}</span>
                        </div>
                    </td>
                    <td class="amount-cell ${amountClass}">
                        ${tx.type === 'income' ? '+' : '-'}₹${Math.abs(tx.amount).toLocaleString()}
                    </td>
                    <td class="date-cell">
                        ${new Date(tx.date).toLocaleDateString('en-IN', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric' 
                        })}
                    </td>
                `;
                tbody.appendChild(row);
            });

            // Update statistics
            updateStats(transactions);
        }

        function updateStats(transactions) {
            const statsContainer = document.getElementById('statsContainer');
            
            const totalIncome = transactions
                .filter(tx => tx.type === 'income')
                .reduce((sum, tx) => sum + parseFloat(tx.amount), 0);
            
            const totalExpenses = transactions
                .filter(tx => tx.type === 'expense')
                .reduce((sum, tx) => sum + parseFloat(tx.amount), 0);
            
            const balance = totalIncome - totalExpenses;
            const totalTransactions = transactions.length;

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value">₹${totalIncome.toLocaleString()}</div>
                    <div class="stat-label">Total Income</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📉</div>
                    <div class="stat-value">₹${totalExpenses.toLocaleString()}</div>
                    <div class="stat-label">Total Expenses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">${balance >= 0 ? '💰' : '⚠️'}</div>
                    <div class="stat-value" style="color: ${balance >= 0 ? '#2e7d32' : '#c62828'}">
                        ₹${balance.toLocaleString()}
                    </div>
                    <div class="stat-label">Balance</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">${totalTransactions}</div>
                    <div class="stat-label">Total Transactions</div>
                </div>
            `;
        }

        // Load transactions when page loads
        loadTransactions();

        // Add some demo data if localStorage is empty (for demonstration)
        if (!localStorage.getItem('transactions')) {
            const demoTransactions = [
                { type: 'income', category: 'Salary', amount: 50000, date: '2024-01-15' },
                { type: 'expense', category: 'Food', amount: 2500, date: '2024-01-14' },
                { type: 'expense', category: 'Transport', amount: 1200, date: '2024-01-13' },
                { type: 'income', category: 'Freelance', amount: 15000, date: '2024-01-12' },
                { type: 'expense', category: 'Shopping', amount: 3500, date: '2024-01-11' }
            ];
            localStorage.setItem('transactions', JSON.stringify(demoTransactions));
            loadTransactions();
        }
    </script>
</body>
</html>
